name: Build Jeopardy Dashboard

on:
  push:
    paths:
      - 'games/**'
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Generate dashboard
        run: python scripts/build_dashboard.py

      - name: Commit and push dashboard
        run: |
          git config user.name "GitHub Actions"
          git config user.email "actions@github.com"
          git add index.html
          git diff --quiet && git diff --staged --quiet || (git commit -m "chore: update dashboard" && git push)
